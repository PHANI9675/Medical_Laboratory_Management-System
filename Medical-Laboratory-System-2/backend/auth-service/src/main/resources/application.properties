# FIX: renamed from auth-service ? user-service so Eureka registration name matches
# billing-service's @FeignClient(name = "user-service") for service discovery to work
spring.application.name=user-service

spring.datasource.url=jdbc:mysql://localhost:3306/auth_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root

spring.sql.init.mode=always
spring.jpa.hibernate.ddl-auto = update
spring.jpa.show-sql = true
spring.jpa.properties.hibernate.dialect = org.hibernate.dialect.MySQLDialect

# FIX: changed from 8082 ? 8081 (auth-service = User Service P1; 8082 is reserved for Order Service per plan)
server.port = 8081

JWT_SECRET = thisisverysecuresecretkeyforjwttokengenerationandvalidationteam5medlab


# --- APPENDED for integration ---
# Config Server ? optional so startup does NOT fail if Config Server is not yet running
spring.config.import=optional:configserver:http://localhost:8888

# Eureka client config (dependency was already in pom.xml; properties were missing)
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

# SpringDoc / Swagger UI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.packages-to-scan=com.cognizant.auth_service