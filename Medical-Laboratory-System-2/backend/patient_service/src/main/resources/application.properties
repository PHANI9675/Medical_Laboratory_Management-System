spring.application.name=patient-service

spring.datasource.url=jdbc:mysql://localhost:3306/patient_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
JWT_SECRET = thisisverysecuresecretkeyforjwttokengenerationandvalidationteam5medlab

spring.security.user.name=admin
spring.security.user.password=admin

spring.jpa.hibernate.ddl-auto = update
spring.jpa.show-sql = true
spring.jpa.properties.hibernate.dialect = org.hibernate.dialect.MySQLDialect

eureka.client.service-url.defaultZone = http://localhost:8761/eureka/
eureka.register-with-eureka=true
eureka.fetch-registry=true
eureka.instance.prefer-ip-address=true

# FIX: changed from 8083 ? 8086 (8083 is reserved for Lab Processing Service per plan;
# patient_service is a team add-on not in the original plan, assigned a new unused port)
server.port = 8086


# --- APPENDED for integration ---
# Config Server ? optional so startup does NOT fail if Config Server is not yet running
spring.config.import=optional:configserver:http://localhost:8888

# SpringDoc / Swagger UI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.packages-to-scan=com.cognizant.patient_service